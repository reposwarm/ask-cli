name: Release

on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]

env:
  VERSION_BASE: "0.2"

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set version
        id: version
        run: |
          VERSION="${VERSION_BASE}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o ask-${{ matrix.suffix }} ./cmd/ask

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          make_latest: true
          files: ask-${{ matrix.suffix }}
          body: |
            ## ask CLI v${{ steps.version.outputs.version }}

            Install: `curl -fsSL https://raw.githubusercontent.com/reposwarm/ask-cli/main/install.sh | sh`
            Upgrade: re-run the install command
